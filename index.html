<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Shop POS</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:Arial;margin:0;background:#f5f6fa;}
.header{background:#2f3640;color:white;padding:12px;text-align:center;}
.screen{display:none;padding:12px;padding-bottom:80px;}
.screen.active{display:block;}
.scanner{display:flex;gap:6px;margin-bottom:10px;}
input{padding:10px;margin:5px 0;width:100%;box-sizing:border-box;}
button{padding:10px;cursor:pointer;}
table{width:100%;background:white;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ddd;padding:6px;text-align:center;}
.bottomNav{position:fixed;bottom:0;width:100%;background:#2f3640;display:flex;}
.bottomNav button{flex:1;color:white;background:transparent;border:none;padding:14px;}
.scanBtn{background:#0984e3;color:white;}
.checkoutBtns{display:flex;gap:10px;margin-top:10px;}
.paid{background:#27ae60;color:white;flex:1;}
.udhar{background:#e67e22;color:white;flex:1;}
#reader{width:100%;display:none;margin-top:10px;}
</style>
</head>
<body>

<header class="header">
<h2 id="screenTitle">POS</h2>
</header>

<!-- POS -->
<section id="posScreen" class="screen active">
<div class="scanner">
<input id="barcodeInput" placeholder="Scan barcode...">
<button class="scanBtn" onclick="startScanner('pos')">📷 Scan</button>
<button onclick="addToCart()">Add</button>
</div>
<div id="reader"></div>

<table>
<thead><tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th></tr></thead>
<tbody id="cartBody"></tbody>
</table>

<h3 id="grandTotal">Grand Total: Rs 0</h3>

<div class="checkoutBtns">
<button class="paid" onclick="checkout()">Paid</button>
<button class="udhar">Pay Later</button>
</div>
</section>

<!-- INVENTORY -->
<section id="inventoryScreen" class="screen">
<h3>Add / Update Item</h3>

<button class="scanBtn" onclick="startScanner('inventory')">📷 Scan Barcode</button>
<div id="readerInventory"></div>

<input id="invBarcode" placeholder="Barcode">
<input id="invName" placeholder="Item name">
<input id="invPrice" type="number" placeholder="Price">
<input id="invQty" type="number" placeholder="Quantity">

<button onclick="saveItem()">Save Item</button>

<h3>Inventory List</h3>
<div id="inventoryList"></div>
</section>

<section id="udharScreen" class="screen"><h3>Udhar — Coming Next</h3></section>
<section id="analyticsScreen" class="screen"><h3>Analytics — Coming Next</h3></section>
<section id="settingsScreen" class="screen"><h3>Settings — Coming Next</h3></section>

<nav class="bottomNav">
<button onclick="switchTab('pos')">POS</button>
<button onclick="switchTab('inventory')">Inventory</button>
<button onclick="switchTab('udhar')">Udhar</button>
<button onclick="switchTab('analytics')">Analytics</button>
<button onclick="switchTab('settings')">Settings</button>
</nav>

<script>
// ===== DATA =====
let products = JSON.parse(localStorage.getItem("products")||"[]");
let cart=[];
let html5QrCode=null;
let currentMode=null;
let lastScan="";

// ===== TAB SWITCH =====
function switchTab(tab){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(tab+"Screen").classList.add("active");
document.getElementById("screenTitle").innerText=tab.charAt(0).toUpperCase()+tab.slice(1);
stopScanner();
renderInventory();
}

// ===== SCANNER CONTROL =====
function stopScanner(){
if(html5QrCode){
html5QrCode.stop().catch(()=>{});
html5QrCode.clear().catch(()=>{});
html5QrCode=null;
}
document.getElementById("reader").style.display="none";
const inv=document.getElementById("readerInventory");
if(inv) inv.style.display="none";
}

function startScanner(mode){
currentMode=mode;
stopScanner();

const readerId=mode==="pos"?"reader":"readerInventory";
const div=document.getElementById(readerId);
div.style.display="block";
div.innerHTML="";

html5QrCode=new Html5Qrcode(readerId);

html5QrCode.start(
{facingMode:{exact:"environment"}},
{fps:25,qrbox:{width:280,height:120}},
onScanSuccess
).catch(err=>alert("Camera error: "+err));
}

// ===== ON SCAN =====
function onScanSuccess(code){
if(code===lastScan) return;
lastScan=code;
stopScanner();

setTimeout(()=>{
if(currentMode==="inventory"){
invBarcode.value=code;

const existing=products.find(p=>p.barcode===code);
if(existing){
alert("Item already exists — you can update it.");
invName.value=existing.name;
invPrice.value=existing.price;
invQty.value=existing.qty;
}
}else{
barcodeInput.value=code;
addToCart();
}
setTimeout(()=>lastScan="",1500);
},150);
}

// ===== SAVE ITEM =====
function saveItem(){
const barcode=invBarcode.value.trim();
const name=invName.value.trim();
const price=Number(invPrice.value);
const qty=Number(invQty.value);

if(!barcode||!name){alert("Enter barcode and name");return;}

let existing=products.find(p=>p.barcode===barcode);

if(existing){
existing.name=name;
existing.price=price;
existing.qty=qty;
alert("Item updated");
}else{
products.push({barcode,name,price,qty});
alert("Item added");
}

localStorage.setItem("products",JSON.stringify(products));

invBarcode.value="";
invName.value="";
invPrice.value="";
invQty.value="";
renderInventory();
}

// ===== INVENTORY LIST =====
function renderInventory(){
const div=document.getElementById("inventoryList");
if(!div) return;
div.innerHTML=products.map(p=>`${p.name} — Qty: ${p.qty}`).join("<br>");
}

// ===== ADD TO CART =====
function addToCart(){
const code=barcodeInput.value.trim();
if(!code) return;

const product=products.find(p=>p.barcode===code);
if(!product){alert("Item not in inventory");return;}
if(product.qty<=0){alert("Out of stock");return;}

let item=cart.find(c=>c.barcode===code);
if(item) item.qty++;
else cart.push({barcode:product.barcode,name:product.name,price:product.price,qty:1});

barcodeInput.value="";
renderCart();
}

// ===== RENDER CART =====
function renderCart(){
const body=document.getElementById("cartBody");
body.innerHTML=cart.map(i=>`
<tr>
<td>${i.name}</td>
<td>${i.price}</td>
<td>${i.qty}</td>
<td>${i.price*i.qty}</td>
</tr>`).join("");

const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
grandTotal.innerText="Grand Total: Rs "+total;
}

// ===== CHECKOUT =====
function checkout(){
cart.forEach(c=>{
const p=products.find(x=>x.barcode===c.barcode);
if(p) p.qty-=c.qty;
});
localStorage.setItem("products",JSON.stringify(products));
cart=[];
renderCart();
renderInventory();
alert("Sale completed");
}

// INIT
renderInventory();
</script>
</body>
</html>
